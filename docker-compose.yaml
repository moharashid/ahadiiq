# Use postgres/example user/password credentials

services:

  ahadiiq-postgres:
    image: postgres:17
    restart: unless-stopped
    ports: 
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: ahadiiq

    volumes:
      - ahadiiq_postgres_data:/var/lib/postgresql/data

  ahadiiq-adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
volumes:
  ahadiiq_postgres_data: